$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'

tasks:
  dev:
    command: 'bun run dev'
    options:
      runInCI: false  # dev server: skipped in CI, never cached

  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'wrangler.jsonc'
      - 'package.json'
    outputs:
      - 'dist'

  deploy:
    command: 'bun run deploy'
    deps:
      - '~:build'
